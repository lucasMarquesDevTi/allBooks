name: Workflow de Integração Contínua 

on:
  pull_request:
    branches: [ "main" ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd allbooks-aula-01
          npm install

      - name: Run tests
        run: |
          cd allbooks-aula-01
          npm test
