name: Workflow de Integração Contínua 

on:
  pull_request:
    branches: [ "main" ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Mostrar estrutura do projeto
        run: ls -R
      
      - name: Install dependencies
        working-directory: ./allbooks-aula-01
        run: npm install

      - name: Run tests
        working-directory: ./allbooks-aula-01
        run: npm test
